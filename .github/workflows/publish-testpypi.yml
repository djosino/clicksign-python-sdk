# Publica no TestPyPI em push para branch release/<version> (ex.: release/0.1.2).
#
# Trusted Publishing (TestPyPI) — configurar UMA vez:
#   https://test.pypi.org/manage/project/clicksign-python-sdk/settings/publishing/
#   → Add publisher → GitHub
#   → Owner: djosino | Repository: clicksign-python-sdk
#   → Workflow name: publish-testpypi.yml
#   → Environment name: (deixar VAZIO — o workflow não usa GitHub Environment)
#
# Fallback com API token: secret TEST_PYPI_API_TOKEN + descomente username/password abaixo.

name: Publish to TestPyPI

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

concurrency:
  group: publish-testpypi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Branch release/<version> deve coincidir com REVISION
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          version="${branch#release/}"
          version="${version#v}"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Branch inválida: use release/X.Y.Z (recebido: release/$version)"
            exit 1
          fi
          revision=$(tr -d '[:space:]' < REVISION)
          if [ "$version" != "$revision" ]; then
            echo "release/$version != REVISION ($revision)"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests && ruff format --check src tests

      - name: Pytest
        run: pytest -q --cov=clicksign --cov-fail-under=88
        env:
          PYTHONPATH: src

  publish:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # username: __token__
          # password: ${{ secrets.TEST_PYPI_API_TOKEN }}
