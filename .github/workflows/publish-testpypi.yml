# Publica no TestPyPI em push para branch release/<version> (ex.: release/0.1.1).
#
# Configuração única (Trusted Publishing — sem secret de API):
#   1. https://test.pypi.org/manage/project/clicksign-python-sdk/settings/publishing/
#   2. Add a new publisher → GitHub
#   3. Owner: djosino | Repository: clicksign-python-sdk
#   4. Workflow: publish-testpypi.yml | Environment: testpypi (ou vazio se não usar environment)
#   5. No GitHub: Settings → Environments → criar "testpypi" (opcional; protege com approval)
#
# Alternativa com token: defina o secret TEST_PYPI_API_TOKEN e descomente o bloco "with:" abaixo.

name: Publish to TestPyPI

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/checkout@v4

      - name: Branch release/<version> deve coincidir com REVISION
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          version="${branch#release/}"
          version="${version#v}"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Branch inválida: use release/X.Y.Z (recebido: release/$version)"
            exit 1
          fi
          revision=$(tr -d '[:space:]' < REVISION)
          if [ "$version" != "$revision" ]; then
            echo "release/$version != REVISION ($revision)"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # username: __token__
          # password: ${{ secrets.TEST_PYPI_API_TOKEN }}
