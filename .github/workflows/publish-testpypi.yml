# Release: push em release/<version> → testes → TestPyPI → PyPI.
#
# Secrets (Settings → Secrets → Actions):
#   TEST_PYPI_API_TOKEN — token de https://test.pypi.org
#   PYPI_API_TOKEN      — token de https://pypi.org (produção)

name: Publish release (TestPyPI → PyPI)

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

concurrency:
  group: publish-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Branch release/<version> deve coincidir com REVISION
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          version="${branch#release/}"
          version="${version#v}"
          if ! echo "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Branch inválida: use release/X.Y.Z (recebido: release/$version)"
            exit 1
          fi
          revision=$(tr -d '[:space:]' < REVISION)
          if [ "$version" != "$revision" ]; then
            echo "release/$version != REVISION ($revision)"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests && ruff format --check src tests

      - name: Pytest
        run: pytest -q --cov=clicksign --cov-fail-under=88
        env:
          PYTHONPATH: src

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: python -m pip install --upgrade pip build && python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          username: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          packages-dir: dist

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          username: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
