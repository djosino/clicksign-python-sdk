# Publica no PyPI de produção (manual — após validar no TestPyPI).
#
# Obrigatório: secret PYPI_API_TOKEN (token de https://pypi.org, NÃO test.pypi.org).
#   GitHub → Settings → Secrets and variables → Actions → PYPI_API_TOKEN
#
# Disparo: Actions → Publish to PyPI → Run workflow
#   Informe a versão (ex.: 0.1.2) — deve ser igual ao REVISION do ref escolhido (use branch main).

name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão semver (igual a REVISION no commit)"
        required: true
        type: string

concurrency:
  group: publish-pypi-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Versão deve coincidir com REVISION
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Versão inválida: use X.Y.Z"
            exit 1
          fi
          revision=$(tr -d '[:space:]' < REVISION)
          if [ "${{ inputs.version }}" != "$revision" ]; then
            echo "input (${{ inputs.version }}) != REVISION ($revision)"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests && ruff format --check src tests

      - name: Pytest
        run: pytest -q --cov=clicksign --cov-fail-under=88
        env:
          PYTHONPATH: src

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI (API token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          username: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
