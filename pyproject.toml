[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "clicksign"
dynamic = ["version"]
description = "Official Python SDK for the Clicksign e-signature API (v3)"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "responses",
    "ruff",
    "mypy",
]

[tool.hatch.version]
path = "REVISION"
pattern = "^(?P<version>.+)$"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4"]

[tool.mypy]
python_version = "3.10"
strict = true
files = ["src"]
